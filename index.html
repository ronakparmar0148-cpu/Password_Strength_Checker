<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Strength Checker
</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🔐 Enterprise Security Analyzer</h1>

  <input type="password" id="pass" placeholder="Enter password">

  <div class="btns">
    <button onclick="toggle()">👁</button>
    <button onclick="generate()">🔑</button>
    <button onclick="copy()">📋</button>
  </div>

  <div class="bar">
    <div id="fill"></div>
  </div>

  <div id="score"></div>
  <div id="risk"></div>
  <div id="time"></div>
  <div id="suggest"></div>

</div>

<script src="script.js"></script>
</body>
</html>
